# ========================================
# Animantis CI Pipeline
# ========================================
name: CI

on:
  push:
    branches: [main, "feature/*", "fix/*"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: "🔍 Lint & Format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  typecheck:
    name: "📝 Type Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install mypy

      - name: Run mypy
        run: mypy animantis/ --ignore-missing-imports

  security:
    name: "🔒 Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit
        run: bandit -r animantis/ -ll -ii

  test:
    name: "🧪 Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install httpx

      - name: Run tests
        run: pytest --tb=short -q
        env:
          APP_ENV: test
          DEBUG: "true"
          SECRET_KEY: test-secret-key-for-ci-only
          DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/test"
          REDIS_URL: "redis://localhost:6379/0"
          TELEGRAM_BOT_TOKEN: "test-token"
          YANDEX_API_KEY: "test-key"
          YANDEX_FOLDER_ID: "test-folder"

  docker:
    name: "🐳 Docker Build"
    runs-on: ubuntu-latest
    needs: [lint, typecheck, security, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t animantis:test .
