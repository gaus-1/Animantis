# ========================================
# Animantis CI Pipeline
# ========================================
name: CI

on:
  push:
    branches: [main, "feature/*", "fix/*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  lint:
    name: "🔍 Lint & Format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  typecheck:
    name: "📝 Type Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install mypy

      - name: Run mypy
        run: mypy animantis/ --ignore-missing-imports

  security:
    name: "🔒 Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit
        run: bandit -r animantis/ -ll -ii

  test:
    name: "🧪 Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install httpx

      - name: Run tests
        run: pytest --tb=short -q
        env:
          APP_ENV: test
          DEBUG: "true"
          SECRET_KEY: test-secret-key-for-ci-only  # pragma: allowlist secret
          DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/test"  # pragma: allowlist secret
          REDIS_URL: "redis://localhost:6379/0"
          TELEGRAM_BOT_TOKEN: "test-token"
          YANDEX_API_KEY: "test-key"  # pragma: allowlist secret
          YANDEX_FOLDER_ID: "test-folder"

  frontend-build:
    name: "⚛️ Frontend Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript + Vite build
        run: npm run build

  docker:
    name: "🐳 Docker Build + Attest"
    runs-on: ubuntu-latest
    needs: [lint, typecheck, security, test, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t animantis:${{ github.sha }} .

      - name: Save Docker image as artifact
        run: |
          docker save animantis:${{ github.sha }} -o animantis-image.tar

      - name: Upload artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: animantis-docker-${{ github.sha }}
          path: animantis-image.tar
          retention-days: 7

      - name: Attest artifact
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: animantis-docker-${{ github.sha }}
          subject-path: animantis-image.tar
