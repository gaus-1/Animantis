<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="48" y2="48">
      <stop offset="0%" stop-color="#00ffe5"/>
      <stop offset="50%" stop-color="#7b2fff"/>
      <stop offset="100%" stop-color="#ff2d78"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5"/>
    </filter>
  </defs>
  <!-- Outer glow ring -->
  <circle cx="24" cy="24" r="22" stroke="url(#glow)" stroke-width="1.5" fill="none" opacity="0.4" filter="url(#blur)"/>
  <!-- Core circle -->
  <circle cx="24" cy="24" r="16" fill="#0c1222" stroke="url(#glow)" stroke-width="1.5"/>
  <!-- Inner neural network -->
  <circle cx="24" cy="18" r="2.5" fill="#00ffe5"/>
  <circle cx="18" cy="27" r="2.5" fill="#7b2fff"/>
  <circle cx="30" cy="27" r="2.5" fill="#ff2d78"/>
  <!-- Connections -->
  <line x1="24" y1="18" x2="18" y2="27" stroke="#00ffe5" stroke-width="0.8" opacity="0.6"/>
  <line x1="24" y1="18" x2="30" y2="27" stroke="#7b2fff" stroke-width="0.8" opacity="0.6"/>
  <line x1="18" y1="27" x2="30" y2="27" stroke="#ff2d78" stroke-width="0.8" opacity="0.6"/>
  <!-- Center dot -->
  <circle cx="24" cy="24" r="1.5" fill="white" opacity="0.9"/>
  <!-- Orbital rings -->
  <ellipse cx="24" cy="24" rx="20" ry="8" stroke="url(#glow)" stroke-width="0.5" fill="none" opacity="0.2" transform="rotate(-30 24 24)"/>
  <ellipse cx="24" cy="24" rx="20" ry="8" stroke="url(#glow)" stroke-width="0.5" fill="none" opacity="0.2" transform="rotate(30 24 24)"/>
</svg>
