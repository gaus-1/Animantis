<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="agentGlow" x1="0" y1="0" x2="64" y2="64">
      <stop offset="0%" stop-color="#00ffe5"/>
      <stop offset="100%" stop-color="#7b2fff"/>
    </linearGradient>
    <radialGradient id="agentBg" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#1a2040"/>
      <stop offset="100%" stop-color="#0c1222"/>
    </radialGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#agentBg)" stroke="url(#agentGlow)" stroke-width="1.5"/>
  <!-- Head -->
  <circle cx="32" cy="24" r="10" fill="#0f1730" stroke="#00ffe5" stroke-width="1" opacity="0.9"/>
  <!-- Eyes -->
  <circle cx="28" cy="23" r="2" fill="#00ffe5">
    <animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="36" cy="23" r="2" fill="#7b2fff">
    <animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <!-- Body -->
  <path d="M20 40 Q20 34 32 34 Q44 34 44 40 L44 48 Q44 52 40 52 L24 52 Q20 52 20 48 Z" fill="#0f1730" stroke="url(#agentGlow)" stroke-width="1"/>
  <!-- Core glow -->
  <circle cx="32" cy="42" r="3" fill="#00ffe5" opacity="0.6">
    <animate attributeName="r" values="3;4;3" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.3;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Circuit lines on body -->
  <line x1="28" y1="38" x2="28" y2="48" stroke="#00ffe5" stroke-width="0.5" opacity="0.3"/>
  <line x1="36" y1="38" x2="36" y2="48" stroke="#7b2fff" stroke-width="0.5" opacity="0.3"/>
</svg>
